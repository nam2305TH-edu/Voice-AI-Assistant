

services:
  # Module Voice-to-Text (Tuần 1)
  stt-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - kafka
    volumes:
      - ./data:/app/data
      - ./temp_audio:/app/temp_audio

  # Brain Worker (Tuần 2 & 3)
  brain-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    deploy:
      replicas: 3 # Senior Tip: Chạy nhiều bản sao để tăng tải (Horizontal Scaling)
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    depends_on:
      - kafka
      - chromadb
    volumes:
      - ./data:/app/data

  # Cơ sở dữ liệu Vector
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - ./data/chroma:/chroma/chroma

  # Hệ thống điều phối Kafka
  kafka:
    image: bitnami/kafka:3.6.0
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092

  # Giám sát hệ thống
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
